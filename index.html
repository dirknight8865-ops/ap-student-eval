<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP 能力评估系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f1f5f9; --card: #fff; --accent: #3b82f6; --accent-h: #2563eb; --text: #0f172a; --text2: #475569; --border: #e2e8f0; --radius: 10px; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; --shadow: 0 1px 3px rgba(0,0,0,.08); }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 1440px; margin: 0 auto; padding: 24px 20px 60px; }
header { margin-bottom: 24px; }
header h1 { font-size: 26px; font-weight: 700; letter-spacing: -.3px; }
header p { color: var(--text2); font-size: 15px; margin-top: 2px; }
header .tag { display: inline-block; font-size: 12px; background: var(--accent); color: #fff; padding: 2px 10px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }
.layout { display: grid; grid-template-columns: 420px 1fr; gap: 24px; align-items: start; }
@media (max-width: 1050px) { .layout { grid-template-columns: 1fr; } }
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border); }
.card h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
.form-row { margin-bottom: 10px; }
.form-row label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
.form-row input, .form-row select { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 14px; outline: none; }
.form-row input:focus, .form-row select:focus { border-color: var(--accent); }
.form-inline { display: flex; gap: 6px; align-items: flex-end; }
.form-inline > *:first-child { flex: 1; }
.btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn:hover { background: var(--accent-h); }
.btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-outline:hover { background: #f1f5f9; color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-block { width: 100%; }
.slider-group { display: flex; align-items: center; gap: 10px; }
.slider-group input[type="range"] { flex: 1; accent-color: var(--accent); }
.slider-value { min-width: 24px; text-align: center; font-weight: 700; font-size: 18px; color: var(--accent); }
.ability-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
@media (max-width: 500px) { .ability-grid { grid-template-columns: 1fr; } }
.ability-field label { font-size: 13px; font-weight: 500; display: block; margin-bottom: 2px; }
.ability-field .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: #94a3b8; margin-top: -2px; }
.student-tree { margin-top: 8px; }
.student-node { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
.student-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f8fafc; cursor: pointer; user-select: none; }
.student-header:hover { background: #f1f5f9; }
.student-header .name { font-weight: 600; font-size: 14px; }
.student-header .count { font-size: 12px; color: var(--text2); margin-left: 8px; }
.subject-list { padding: 6px 12px 8px 12px; }
.subject-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: 6px; margin-bottom: 2px; }
.subject-item:hover { background: #f1f5f9; }
.subject-item .sname { font-size: 13px; font-weight: 500; }
.subject-item .pred-score { display: inline-block; font-size: 13px; font-weight: 700; padding: 1px 8px; border-radius: 4px; color: #fff; margin-left: 4px; }
.ps-5 { background: #22c55e; } .ps-4 { background: #3b82f6; } .ps-3 { background: #f59e0b; } .ps-2 { background: #f97316; } .ps-1 { background: #ef4444; }
.subject-item .scores { font-size: 11px; color: var(--text2); display: flex; gap: 2px 6px; flex-wrap: wrap; margin-top: 2px; }
.score-digit { display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center; border-radius: 3px; font-weight: 600; font-size: 11px; color: #fff; }
.sd-5 { background: #22c55e; } .sd-4 { background: #3b82f6; } .sd-3 { background: #f59e0b; } .sd-2 { background: #f97316; } .sd-1 { background: #ef4444; }
.subject-actions { display: flex; gap: 4px; }
.btn-icon { background: none; border: none; cursor: pointer; padding: 3px 5px; border-radius: 4px; font-size: 13px; color: var(--text2); }
.btn-icon:hover { background: #e2e8f0; color: var(--text); }
.btn-icon.danger:hover { color: var(--red); background: #fef2f2; }
.tabs { display: flex; gap: 4px; margin-bottom: 12px; background: #f1f5f9; border-radius: 8px; padding: 3px; flex-wrap: wrap; }
.tab-btn { flex: 1; min-width: 60px; padding: 6px 10px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; }
.tab-btn.active { background: #fff; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.tab-btn:hover:not(.active) { color: var(--text); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.chart-container { position: relative; height: 270px; }
.chart-container-sm { position: relative; height: 200px; }
.table-wrap { overflow-x: auto; }
table.data { width: 100%; font-size: 13px; border-collapse: collapse; }
table.data th { text-align: center; font-size: 12px; font-weight: 600; color: var(--text2); padding: 6px 6px; border-bottom: 2px solid var(--border); background: #f8fafc; }
table.data td { padding: 5px 6px; text-align: center; border-bottom: 1px solid #f1f5f9; }
table.data td:first-child, table.data th:first-child { text-align: left; }
.cell-best { background: #dcfce7; font-weight: 600; }
.cell-worst { background: #fef2f2; }
.model-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.model-k-select { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); }
.model-k-select select { border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:13px; outline:none; }
.cluster-card { border-radius: 8px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
.cluster-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.cluster-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink:0; }
.cluster-members { font-size: 13px; color: var(--text2); margin-bottom: 6px; }
.cluster-range table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.cluster-range td, .cluster-range th { padding: 3px 6px; font-size: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; }
.cluster-range th { font-weight: 600; color: var(--text2); }
.model-explanation { background: #f8fafc; border-radius: 8px; padding: 14px; border: 1px solid var(--border); margin-top: 12px; font-size: 13px; line-height: 1.7; }
.model-explanation code { background: #e2e8f0; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
.model-explanation .math { font-style: italic; color: var(--accent); }
.insight-card { background: #f8fafc; border-radius: 8px; padding: 12px; border: 1px solid var(--border); margin-bottom: 8px; }
.insight-card:last-child { margin-bottom: 0; }
.insight-card h4 { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.insight-card p { font-size: 13px; color: var(--text2); line-height: 1.5; }
.strength { border-left: 3px solid var(--green); } .weakness { border-left: 3px solid var(--red); } .insight { border-left: 3px solid var(--accent); }
.empty-state { text-align: center; padding: 40px 16px; color: #94a3b8; font-size: 14px; }
.empty-state p { margin-top: 4px; }
.rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; }
.rank-1 { background: #fef3c7; color: #b45309; } .rank-2 { background: #e5e7eb; color: #4b5563; } .rank-3 { background: #fed7aa; color: #c2410c; } .rank-other { background: #f1f5f9; color: #64748b; }
.comp-select { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.comp-select label { font-size: 13px; color: var(--text2); }
.comp-select select { border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:13px; outline:none; }
.modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal-box { background: #fff; border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.15); }
.modal-box h3 { font-size: 17px; margin-bottom: 8px; }
.modal-box p { font-size: 14px; color: var(--text2); margin-bottom: 18px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 800px) { .overview-grid { grid-template-columns: 1fr; } }
.formula-card { background: #f8fafc; border-radius: 8px; padding: 14px; border: 1px solid var(--border); margin-bottom: 10px; font-size: 13px; line-height: 1.7; }
.formula-card .fn { font-weight: 600; color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>AP 能力评估 <span class="tag">五分制·预测模型</span></h1>
    <div style="margin-top:10px;font-size:13px;">
      <select id="courseFilter" onchange="filterBySubject()" style="padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;">
        <option value="">全部科目</option>
        <option value="AP Physics C: Mechanics">AP Physics C: Mechanics</option>
        <option value="AP Physics C: Electricity & Magnetism">AP Physics C: E&amp;M</option>
        <option value="AP Calculus BC">AP Calculus BC</option>
      </select>
    </div>
    <p>六项能力自动预测AP得分</p>
  </header>
  <div class="layout">
    <div>
      <div class="card" style="margin-bottom:16px;">
        <h2>学生管理</h2>
        <div class="form-row"><label>选择或新建学生</label>
          <div class="form-inline"><select id="studentSelect" onchange="onStudentSelect()"><option value="__new__">+ 新建学生</option></select></div>
        </div>
        <div class="form-row" id="newStudentRow" style="display:none;">
          <div class="form-inline"><input type="text" id="newStudentInput" placeholder="输入学生姓名" maxlength="20"><button class="btn btn-sm" onclick="createStudent()">确认</button></div>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">
        <div id="subjectSection">
          <div class="form-row"><label>科目</label>
            <div class="form-inline">
              <select id="subjectSelect" onchange="onSubjectChange()" style="flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;outline:none;">
                <option value="">选择科目</option>
                <option value="AP Physics C: Mechanics">AP Physics C: Mechanics</option>
                <option value="AP Physics C: Electricity & Magnetism">AP Physics C: E&amp;M</option>
                <option value="AP Calculus BC">AP Calculus BC</option>
                <option value="__custom__">其他（手动输入）</option>
              </select>
              <input type="text" id="subjectCustomInput" placeholder="输入科目名称" style="display:none;flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;outline:none;">
            </div>
          </div>
          <datalist id="subjectDatalist"></datalist>
          <div class="ability-grid">
            <div class="ability-field"><label>学习态度</label><div class="slider-group"><input type="range" min="1" max="5" step="1" value="3" id="ab-0" oninput="sv(0)"><span class="slider-value" id="sv-0">3</span></div><div class="slider-labels"><span>1差</span><span>3合格</span><span>5优</span></div></div>
            <div class="ability-field"><label>学习自驱力</label><div class="slider-group"><input type="range" min="1" max="5" step="1" value="3" id="ab-1" oninput="sv(1)"><span class="slider-value" id="sv-1">3</span></div><div class="slider-labels"><span>1差</span><span>3合格</span><span>5优</span></div></div>
            <div class="ability-field"><label>基础能力</label><div class="slider-group"><input type="range" min="1" max="5" step="1" value="3" id="ab-2" oninput="sv(2)"><span class="slider-value" id="sv-2">3</span></div><div class="slider-labels"><span>1差</span><span>3合格</span><span>5优</span></div></div>
            <div class="ability-field"><label>英语能力</label><div class="slider-group"><input type="range" min="1" max="5" step="1" value="3" id="ab-3" oninput="sv(3)"><span class="slider-value" id="sv-3">3</span></div><div class="slider-labels"><span>1差</span><span>3合格</span><span>5优</span></div></div>
            <div class="ability-field"><label>考试能力</label><div class="slider-group"><input type="range" min="1" max="5" step="1" value="3" id="ab-4" oninput="sv(4)"><span class="slider-value" id="sv-4">3</span></div><div class="slider-labels"><span>1差</span><span>3合格</span><span>5优</span></div></div>
            <div class="ability-field"><label>抗压能力</label><div class="slider-group"><input type="range" min="1" max="5" step="1" value="3" id="ab-5" oninput="sv(5)"><span class="slider-value" id="sv-5">3</span></div><div class="slider-labels"><span>1差</span><span>3合格</span><span>5优</span></div></div>
          </div>
          <div class="form-row" style="margin-top:8px;">
            <label>实际AP分（可选，用于验证公式）</label>
            <input type="number" id="actualScore" min="1" max="5" step="1" placeholder="留空则未知" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:14px;outline:none;">
          </div>
          <div style="margin-top:10px;display:flex;gap:6px;">
            <button class="btn btn-sm btn-block" onclick="saveSubject()" id="subjectAddBtn">保存评分</button>
            <button class="btn btn-sm btn-block btn-outline" onclick="resetSliders()">重置</button>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>已录入数据 <span id="dataStats" style="font-size:12px;font-weight:400;color:var(--text2);"></span></h2>
        <div id="studentTree" class="student-tree"></div>
        <div style="margin-top:10px;display:flex;gap:6px;">
          <button class="btn btn-sm btn-block btn-outline" onclick="saveToFile()">保存到文件</button>
          <button class="btn btn-sm btn-block btn-outline" onclick="document.getElementById('importFile').click()">加载文件</button>
          <button class="btn btn-sm btn-block btn-outline" onclick="loadExampleData()">重置初始数据</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="loadFromFile(event)">
        </div>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:16px;">
        <h2>分析总览</h2>
        <div id="analysisOverview" class="empty-state"><div style="font-size:36px;">📊</div><p>添加数据后自动分析</p></div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
          <h2 style="margin:0;">详细分析</h2>
          <select id="analysisFilter" onchange="filterAnalysis()" style="padding:4px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;">
            <option value="">全部科目</option>
            <option value="AP Physics C: Mechanics">AP Physics C: Mechanics</option>
            <option value="AP Physics C: Electricity & Magnetism">AP Physics C: E&amp;M</option>
            <option value="AP Calculus BC">AP Calculus BC</option>
          </select>
        </div>
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('formula',this)">预测公式</button>
          <button class="tab-btn" onclick="switchTab('ranking',this)">排名</button>
          <button class="tab-btn" onclick="switchTab('radar',this)">雷达图</button>
          <button class="tab-btn" onclick="switchTab('cluster',this)">聚类模型</button>
          <button class="tab-btn" onclick="switchTab('standard',this)">评价标准</button>
          <button class="tab-btn" onclick="switchTab('insights',this)">洞察</button>
        </div>
        <div id="tab-formula" class="tab-content active"></div>
        <div id="tab-ranking" class="tab-content"></div>
        <div id="tab-radar" class="tab-content"></div>
        <div id="tab-cluster" class="tab-content"></div>
        <div id="tab-standard" class="tab-content"></div>
        <div id="tab-insights" class="tab-content"></div>
      </div>
    </div>
  </div>
</div>
<script>
// ═══════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════
window.onerror = function(msg, url, line) {
  console.error("JS Error:", msg, "line:", line);
};

const ABILITIES = ['学习态度','学习自驱力','基础能力','英语能力','考试能力','抗压能力'];
const CLUSTER_COLORS = [
  { bg:'#3b82f6', light:'#eff6ff' }, { bg:'#ef4444', light:'#fef2f2' },
  { bg:'#22c55e', light:'#f0fdf4' }, { bg:'#f59e0b', light:'#fffbeb' },
  { bg:'#8b5cf6', light:'#f5f3ff' }, { bg:'#ec4899', light:'#fdf2f8' },
  { bg:'#14b8a6', light:'#f0fdfa' }, { bg:'#f97316', light:'#fff7ed' },
];
// ═══════════════════════════════════════════
//  各科目 AP 预测公式
// ═══════════════════════════════════════════
const COURSE_FORMULAS = {
  "AP Physics C: Mechanics": {
    penaltyRates: [0.10, 0.20, 0.40, 0.40, 0.20, 0.10],
    hasSpecial: true
  },
  "AP Physics C: Electricity & Magnetism": {
    penaltyRates: [0.10, 0.20, 0.40, 0.40, 0.20, 0.10],
    hasSpecial: true
  },
  "AP Calculus BC": {
    penaltyRates: [0.00, 0.00, 0.00, 0.10, 0.10, 0.20],
    hasSpecial: false
  }
};

function gs(d){return Array.isArray(d)?d:(d&&d.s?d.s:[]);}
function ga(d){return (d&&!Array.isArray(d)&&d.a!=null)?Math.round(d.a/20):null;}
function getScores(d){return Array.isArray(d)?d:(d&&d.s?d.s:[]);}
function getActual(d){return (d&&!Array.isArray(d)&&d.a!=null)?Math.round(d.a/20):null;}

function predictAP(scores5, courseName) {
  var fmt = COURSE_FORMULAS[courseName] || COURSE_FORMULAS["AP Physics C: Mechanics"];
  var PR = fmt.penaltyRates;
  var TH = 3;
  var base = 0;
  for (var i = 0; i < 6; i++) base += scores5[i] / 6;
  var penalty = 0;
  for (var i = 0; i < 6; i++) {
    penalty += Math.max(0, TH - scores5[i]) * PR[i];
  }
  if (fmt.hasSpecial && scores5[2] >= 4 && scores5[0] <= 3) penalty += 0.4;
  var final = base - penalty;
  var result = Math.max(1, Math.min(5, Math.round(final)));
  return { base: base, penalty: penalty, final: final, result: result };
}

function to5(v) { return (v / 20).toFixed(1); }
function to5r(v) { return Math.round(v / 20); }
function from5(v) { return v * 20; }
function scoreClass5(v) { var s=v/20; return s>=5?"sd-5":s>=4?"sd-4":s>=3?"sd-3":s>=2?"sd-2":"sd-1"; }
function predClass5(v) { return "ps-"+v; }

// ═══════════════════════════════════════════
//  DATA MODEL
// ═══════════════════════════════════════════
var students = {};
var currentStudent = null;
var editingSubject = null;
var barChart = null, radarChart = null, clusterRadarChart = null, standardRadarChart = null;
var currentFilter = "";
var analysisFilter = "";

function getAnalysisPoints() {
  var pts = getDataPoints();
  if (analysisFilter) {
    pts = pts.filter(function(p) { return p.subject === analysisFilter; });
  }
  return pts;
}

function init() {
  try {
    var saved = localStorage.getItem("sra_v4_ap");
    if (saved) {
      try { students = JSON.parse(saved); } catch(e) { students = {}; }
    }
    if (Object.keys(students).length === 0) {
      students = JSON.parse(JSON.stringify(EXAMPLE_DATA));
      localStorage.setItem("sra_v4_ap", JSON.stringify(students));
    }
    renderStudentSelect();
    renderStudentTree();
    onStudentSelect();
    renderAll();
  } catch(e) {
    console.error("Init Error:", e);
  }
}

function saveData() {
  try {
    localStorage.setItem("sra_v4_ap", JSON.stringify(students));
    renderStudentTree();
    renderAll();
  } catch(e) {
    console.error("Save Error:", e);
  }
}

function getDataPoints() {
  var pts = [];
  for (var sn in students) {
    if (!students.hasOwnProperty(sn)) continue;
    var subs = students[sn];
    for (var sj in subs) {
      if (!subs.hasOwnProperty(sj) || sj === "cls") continue;
      pts.push({ name: sn, subject: sj, label: sn+"."+sj, vector: getScores(subs[sj]).slice(), actual: getActual(subs[sj]) });
    }
  }
  return pts;
}

function filterBySubject() {
  var el = document.getElementById("courseFilter");
  currentFilter = el ? el.value : "";
  renderStudentTree();
}

function filterAnalysis() {
  var el = document.getElementById("analysisFilter");
  analysisFilter = el ? el.value : "";
  // Re-render the active tab

// ═══════════════════════════════════════════
//  K-MEANS
// ═══════════════════════════════════════════
function kmeans(data, k, maxIter, restarts) {
  if (maxIter === undefined) maxIter = 100;
  if (restarts === undefined) restarts = 15;
  var n = data.length; if (n < k) return null;
  var d = data[0].vector.length;
  var best = { wcss: 1e100 };
  for (var run = 0; run < restarts; run++) {
    var centroids = []; var used = {};
    for (var i = 0; i < k; i++) { var idx; do { idx = Math.floor(Math.random() * n); } while (used[idx]); used[idx] = true; centroids.push(data[idx].vector.slice()); }
    var asgn = new Array(n).fill(-1);
    for (var iter = 0; iter < maxIter; iter++) {
      var changed = false;
      for (var i = 0; i < n; i++) {
        var md = 1e100, bc = 0;
        for (var j = 0; j < k; j++) { var dd = dist(data[i].vector, centroids[j]); if (dd < md) { md = dd; bc = j; } }
        if (asgn[i] !== bc) changed = true; asgn[i] = bc;
      }
      if (!changed) break;
      for (var j = 0; j < k; j++) {
        var mem = []; for (var i = 0; i < n; i++) { if (asgn[i] === j) mem.push(data[i].vector); }
        if (mem.length > 0) {
          centroids[j] = mem[0].slice();
          for (var dim = 0; dim < centroids[j].length; dim++) {
            var s = 0; for (var mi = 0; mi < mem.length; mi++) s += mem[mi][dim];
            centroids[j][dim] = s / mem.length;
          }
        }
      }
    }
    var wcss = 0;
    for (var i = 0; i < n; i++) wcss += distSq(data[i].vector, centroids[asgn[i]]);
    if (wcss < best.wcss) best = { assignments: asgn.slice(), centroids: centroids.map(function(c){return c.slice();}), wcss: wcss };
  }
  return best;
}
function dist(a,b) { var s=0; for(var i=0;i<a.length;i++) s+=Math.pow(a[i]-b[i],2); return Math.sqrt(s); }
function distSq(a,b) { var s=0; for(var i=0;i<a.length;i++) s+=Math.pow(a[i]-b[i],2); return s; }
function genClusterName(centroid) {
  var idxs = centroid.map(function(v,i){return {i:i,v:v};}).sort(function(a,b){return b.v-a.v;});
  var avg = 0; for (var i = 0; i < centroid.length; i++) avg += centroid[i];
  avg = avg / centroid.length;
  var type = avg>=75?'全能':avg>=55?'均衡':'待发展';
  var gap = idxs[0].v-idxs[idxs.length-1].v;
  var spec = gap>30?'偏科型':gap>15?'倾向型':'综合型';
  return type+'·'+spec+'（'+ABILITIES[idxs[0].i]+'突出）';
}
function runClustering() {
  var kSel = document.getElementById('clusterK');
  var k = kSel ? parseInt(kSel.value, 10) : 3;
  var pts = getDataPoints();
  if (pts.length < k || pts.length < 2) return null;
  var r = kmeans(pts, k); if (!r) return null;
  var clusters = [];
  for (var j = 0; j < k; j++) {
    var members = [], vectors = [];
    for (var i = 0; i < pts.length; i++) { if (r.assignments[i] === j) { members.push(pts[i]); vectors.push(pts[i].vector); } }
    var centroid = r.centroids[j];
    var ranges = [];
    for (var ai = 0; ai < ABILITIES.length; ai++) {
      var vals = vectors.map(function(v) { return v[ai]; });
      var mn = Math.min.apply(null, vals);
      var mx = Math.max.apply(null, vals);
      ranges.push({ ability: ABILITIES[ai], min: mn, max: mx, avg: centroid[ai] });
    }
    clusters.push({ idx: j, name: genClusterName(centroid), members: members, centroid: centroid, ranges: ranges, size: members.length });
  }
  return { clusters: clusters, wcss: r.wcss, points: pts };
}

function switchTab(name, btn) {
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var contents = document.querySelectorAll('.tab-content');
  for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  var fns = { formula: renderFormula, ranking: renderRanking, radar: renderRadar, cluster: renderCluster, standard: renderStandard, insights: renderInsights };
  if (fns[name]) fns[name]();
}

// ═══════════════════════════════════════════
//  ★ TAB: 预测公式 (PREDICTION FORMULA)
// ═══════════════════════════════════════════
function renderFormula() {
  var container = document.getElementById('tab-formula');
  var points = getAnalysisPoints();
  if (points.length === 0) {
    container.innerHTML = '<div class="empty-state"><div style="font-size:36px;">📊</div><p>添加数据后显示预测结果</p></div>';
    return;
  }
  // 根据所选科目动态显示公式
  var courseName = analysisFilter || '';
  var fmt = courseName && COURSE_FORMULAS[courseName] ? COURSE_FORMULAS[courseName] : null;
  var PR = fmt ? fmt.penaltyRates : [0.10, 0.20, 0.40, 0.40, 0.20, 0.10];
  var hasSpec = fmt ? fmt.hasSpecial : true;
  var courseLabel = courseName ? esc(courseName) : '全部科目（混合公式）';
  
  var h = '<div class="formula-card" style="margin-bottom:12px;"><h4 style="font-size:14px;margin-bottom:6px;">预测公式 \u2014 ' + courseLabel + '</h4>';
  h += '<p><code>base = (六项能力之和) / 6</code></p>';
  h += '<p style="font-weight:600;margin-top:6px;">Step 2 - 及格线检查（3分合格）</p>';
  h += '<p><code>penalty = Σ max(0, 3 - xi) * penalty_i</code></p>';
  h += '<table style="width:100%;font-size:13px;border-collapse:collapse;margin:6px 0;">';
  var abilityLabels = ['学习态度','学习自驱力','基础能力','英语能力','考试能力','抗压能力'];
  for (var ri = 0; ri < 6; ri++) {
    var imp = PR[ri] >= 0.30 ? '（最重要）' : PR[ri] >= 0.15 ? '（重要）' : '（有影响）';
    h += '<tr><td>' + abilityLabels[ri] + '</td><td>x' + PR[ri].toFixed(2) + '</td><td style="font-size:11px;color:var(--text2);">' + imp + '</td></tr>';
  }
  h += '</table>';
  if (hasSpec) {
    h += '<p style="font-weight:600;margin-top:6px;">Step 3 - 特殊修正</p>';
    h += '<p><code>if (基础能力 >= 4 且 学习态度 <= 3) penalty += 0.4</code></p>';
    h += '<p style="font-size:12px;color:var(--text2);">=> 有能力但不努力，实际表现会低于预期</p>';
    h += '<p style="font-weight:600;margin-top:6px;">Step 4 - 最终得分</p>';
  } else {
    h += '<p style="font-weight:600;margin-top:6px;">Step 3 - 最终得分</p>';
  }
  h += '<p><code>AP得分 = max(1, min(5, round(base - penalty)))</code></p></div>';
  
  var shortfallStats = [0,0,0,0,0,0];
  var totalCount = 0;
  var detailRows = '';
  for (var pi = 0; pi < points.length; pi++) {
    var p = points[pi];
    var s5 = p.vector.map(function(v) { return to5r(v); });
    var pred = predictAP(s5, p.subject);
    totalCount++;
    var penParts = [];
    // 使用该科目自己的罚率计算扣分明细
    var fmtP = COURSE_FORMULAS[p.subject];
    var prP = fmtP ? fmtP.penaltyRates : PR;
    for (var i = 0; i < 6; i++) {
      if (s5[i] < 3) {
        var d = 3 - s5[i];
        var c = d * prP[i];
        penParts.push(esc(ABILITIES[i]) + '(' + s5[i] + '分-' + c.toFixed(2) + ')');
        shortfallStats[i]++;
      }
    }
    if (fmtP && fmtP.hasSpecial && s5[2] >= 4 && s5[0] <= 3) {
      penParts.push('特殊-0.40');
    }
    detailRows += '<tr><td style="text-align:left;">' + esc(p.label) + '</td><td>' + s5.join('/') + '</td><td>' + pred.base.toFixed(2) + '</td><td style="text-align:left;font-size:11px;">' + (penParts.length ? penParts.join(' + ') : '-') + '</td><td>' + pred.penalty.toFixed(2) + '</td><td>' + pred.final.toFixed(2) + '</td><td><span class="pred-score ' + predClass5(pred.result) + '" style="font-size:14px;">' + pred.result + '</span></td></tr>';
  }
  h += '<div class="formula-card"><h4 style="font-size:14px;margin-bottom:6px;">各项预测明细</h4><div class="table-wrap"><table class="data"><thead><tr><th>数据点</th><th>六项</th><th>base</th><th>扣分明细</th><th>penalty</th><th>final</th><th>预测</th><th>实际</th></tr></thead><tbody>' + detailRows + '</tbody></table></div></div>';
  h += '<div class="formula-card insight"><h4 style="font-size:14px;margin-bottom:4px;">群体不及格统计</h4><p>共 ' + totalCount + ' 条数据，各项能力低于3分的频次：<br>';
  for (var i = 0; i < 6; i++) {
    var pct = (shortfallStats[i] / totalCount * 100).toFixed(0);
    h += esc(ABILITIES[i]) + '：' + shortfallStats[i] + '次 (' + pct + '%)<br>';
  }
  h += '</p></div>';
  container.innerHTML = h;
}

function renderOverview() {
  var container = document.getElementById('analysisOverview');
  var points = getAnalysisPoints();
  if (points.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:20px;"><div style="font-size:36px;">📊</div><p>添加数据后分析</p></div>';
    return;
  }
  var abilityAvgs = [];
  for (var ai = 0; ai < ABILITIES.length; ai++) {
    var vals = points.map(function(p) { return p.vector[ai]; });
    abilityAvgs.push({ name: ABILITIES[ai], avg: vals.reduce(function(s,v){return s+v;},0)/vals.length });
  }
  abilityAvgs.sort(function(a,b){return b.avg-a.avg;});
  var top = abilityAvgs[0], worst = abilityAvgs[abilityAvgs.length-1];
  var clusterResult = runClustering();
  var cn = '';
  if (clusterResult) cn = '<span style="font-size:12px;background:#e0e7ff;padding:2px 8px;border-radius:4px;margin-left:6px;">'+clusterResult.clusters.length+'类 '+points.length+'个数据点</span>';
  var h = '<div class="overview-grid"><div class="insight-card insight"><h4>总览 '+cn+'</h4><p>共'+Object.keys(students).length+'名学生，'+points.length+'条评分</p></div><div class="insight-card strength"><h4>群体最强</h4><p>'+esc(top.name)+'（平均'+to5(top.avg)+'）</p></div><div class="insight-card weakness"><h4>群体待加强</h4><p>'+esc(worst.name)+'（平均'+to5(worst.avg)+'）</p></div>';
  var studentAvgs = {};
  for (var sn in students) {
    if (!students.hasOwnProperty(sn)) continue;
    var subs = students[sn];
    var t=0,c=0;
    for (var key in subs) {
      if (!subs.hasOwnProperty(key) || key === 'cls') continue;
      var arr = getScores(subs[key]);
      for (var qi = 0; qi < arr.length; qi++) t += arr[qi];
      t = t / 6;
      c++;
    }
    studentAvgs[sn] = c>0 ? t/c : 0;
  }
  var ss = Object.entries(studentAvgs).sort(function(a,b){return b[1]-a[1];});
  if (ss.length>0) h += '<div class="insight-card insight"><h4>综合最佳</h4><p>'+esc(ss[0][0])+'（'+to5(ss[0][1])+'）</p></div>';
  h += '</div><div class="chart-container-sm" style="margin-top:4px;"><canvas id="overviewChart"></canvas></div>';
  container.innerHTML = h;
  var ctx = document.getElementById('overviewChart');
  if (!ctx) return;
  if (barChart) barChart.destroy();
  var sorted = points.slice().sort(function(a,b){var sa=0,sb=0;for(var qi=0;qi<6;qi++){sa+=a.vector[qi];sb+=b.vector[qi];}return sb-sa;});
  barChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: sorted.map(function(p){return p.label;}), datasets: [{ label: '综合均分', data: sorted.map(function(p){var s=0;for(var qi=0;qi<6;qi++)s+=p.vector[qi];return s/6;}), backgroundColor: sorted.map(function(p,i){return i===0?'#f59e0b':i===1?'#64748b':i===2?'#d97706':'#93c5fd';}), borderRadius:4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return '综合: '+to5(ctx.raw)+'分'; } } } }, scales: { y: { beginAtZero: true, max: 100, grid: { color: '#f1f5f9' }, ticks: { stepSize: 20, callback: function(v) { return v/20; } } }, x: { grid: { display: false }, ticks: { font: { size: 9 } } } } }
  });
}

function renderRanking() {
  var container = document.getElementById('tab-ranking');
  var points = getAnalysisPoints();
  if (points.length===0) { container.innerHTML='<div class="empty-state"><p>暂无数据</p></div>'; return; }
  var sorted = points.slice().sort(function(a,b){var sa=0,sb=0;for(var qi=0;qi<6;qi++){sa+=a.vector[qi];sb+=b.vector[qi];}return sb-sa;});
  var h = '<div class="table-wrap"><table class="data"><thead><tr><th>排名</th><th>学生</th><th>科目</th>';
  for (var ai = 0; ai < ABILITIES.length; ai++) h += '<th>'+esc(ABILITIES[ai])+'</th>';
  h += '<th>综合</th><th>预测AP</th></tr></thead><tbody>';
  for (var pi = 0; pi < sorted.length; pi++) {
    var p = sorted[pi];
    var rc = pi===0?'rank-1':pi===1?'rank-2':pi===2?'rank-3':'rank-other';
    var avg = 0; for (var qi = 0; qi < 6; qi++) avg += p.vector[qi];
    avg = avg / 6;
    var s5 = p.vector.map(function(v){return to5r(v);});
    var pred = predictAP(s5, p.subject);
    h += '<tr><td><span class="rank-badge '+rc+'">'+(pi+1)+'</span></td><td style="text-align:left;font-weight:500;">'+esc(p.name)+'</td><td style="text-align:left;">'+esc(p.subject)+'</td>';
    for (var qi = 0; qi < 6; qi++) {
      h += '<td><span class="score-digit '+scoreClass5(p.vector[qi])+'">'+to5r(p.vector[qi])+'</span></td>';
    }
    h += '<td><strong>'+to5(avg)+'</strong></td><td><span class="pred-score '+predClass5(pred.result)+'">'+pred.result+'</span></td></tr>';
  }
  h += '</tbody></table></div>';
  container.innerHTML = h;
}

function renderRadar() {
  var container = document.getElementById('tab-radar');
  var points = getAnalysisPoints();
  if (points.length===0) { container.innerHTML='<div class="empty-state"><p>暂无数据</p></div>'; return; }
  var si = parseInt(container.dataset.selectedIdx||0);
  var opts = '';
  for (var pi = 0; pi < points.length; pi++) {
    opts += '<option value="'+pi+'" '+(pi===si?'selected':'')+'>'+esc(points[pi].label)+'</option>';
  }
  container.innerHTML = '<div class="comp-select"><label>选择对比：</label><select id="radarSelect" onchange="document.getElementById(\'tab-radar\').dataset.selectedIdx=this.value;drawRadar()">'+opts+'</select></div><div class="chart-container"><canvas id="radarChart"></canvas></div>';
  drawRadar();
}
function drawRadar() {
  var ctx = document.getElementById('radarChart');
  if (!ctx) return;
  var points = getAnalysisPoints();
  var si = parseInt(document.getElementById('tab-radar').dataset.selectedIdx||0);
  var main = points[si]; if (!main) return;
  var datasets = [{ label: main.label, data: main.vector.map(function(v){return v/20;}), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.15)', pointBackgroundColor: '#3b82f6', pointRadius: 4, borderWidth: 2 }];
  for (var pi = 0; pi < points.length; pi++) {
    if (pi === si) continue;
    var p = points[pi];
    datasets.push({ label: p.label, data: p.vector.map(function(v){return v/20;}), borderColor: '#cbd5e1', backgroundColor: 'transparent', pointBackgroundColor: '#94a3b8', pointRadius: 2, borderWidth: 1, borderDash: [3,3] });
  }
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, { type: 'radar', data: { labels: ABILITIES, datasets: datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 5, ticks: { stepSize: 1, font: { size: 10 } }, pointLabels: { font: { size: 11, weight: '500' } }, grid: { color: '#e2e8f0' }, angleLines: { color: '#e2e8f0' } } }, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 12, padding: 6 } } } } });
}

// ═══════════════════════════════════════════
//  CLUSTER
// ═══════════════════════════════════════════
function renderCluster() {
  var container = document.getElementById('tab-cluster');
  var pts = getAnalysisPoints();
  var kSel = document.getElementById('clusterK');
  var k = kSel ? parseInt(kSel.value, 10) : 3;
  if (pts.length < 2) { container.innerHTML='<div class="empty-state"><div style="font-size:36px;">📐</div><p>至少需要2条数据</p></div>'; return; }
  var result = runClustering();
  if (!result||result.clusters.length<2) { container.innerHTML='<div class="empty-state"><p>聚类失败</p></div>'; return; }
  var opts = '';
  var ks = [2,3,4,5,6];
  for (var oi = 0; oi < ks.length; oi++) {
    opts += '<option value="'+ks[oi]+'" '+(ks[oi]===k?'selected':'')+'>'+ks[oi]+'</option>';
  }
  var h = '<div class="model-header"><div class="model-k-select"><label>分类数(K)：</label><select id="clusterK" onchange="renderCluster()">'+opts+'</select></div><span style="font-size:12px;color:var(--text2);">WCSS='+result.wcss.toFixed(1)+'</span></div>';
  for (var ci = 0; ci < result.clusters.length; ci++) {
    var c = result.clusters[ci];
    var col = CLUSTER_COLORS[ci%CLUSTER_COLORS.length];
    var oAvg = 0; for (var qi = 0; qi < c.centroid.length; qi++) oAvg += c.centroid[qi];
    oAvg = oAvg / 6;
    var members = c.members.map(function(m){return esc(m.label);}).join('\u3001');
    h += '<div class="cluster-card" style="background:'+col.light+';border-color:'+col.bg+'40;"><h4><span class="cluster-dot" style="background:'+col.bg+';"></span> 第'+(ci+1)+'类：'+esc(c.name)+' <span style="font-size:12px;font-weight:400;color:var(--text2);">('+c.size+'条，综合'+to5(oAvg)+')</span></h4><div class="cluster-members">'+members+'</div><div class="cluster-range"><table><thead><tr><th>能力</th><th>最低</th><th>平均</th><th>最高</th><th>区间</th><th>等级</th></tr></thead><tbody>';
    for (var ri = 0; ri < c.ranges.length; ri++) {
      var r = c.ranges[ri];
      h += '<tr><td style="text-align:left;font-weight:500;">'+esc(r.ability)+'</td><td>'+to5r(r.min)+'</td><td><strong>'+to5(r.avg)+'</strong></td><td>'+to5r(r.max)+'</td><td style="font-size:11px;color:var(--text2);">'+to5r(r.min)+'-'+to5r(r.max)+'</td><td><span style="color:'+levelColor5(r.avg)+';font-weight:600;">'+level5(r.avg)+'</span></td></tr>';
    }
    h += '</tbody></table></div></div>';
  }
  h += '<div class="chart-container" style="margin-top:4px;"><canvas id="clusterRadarChart"></canvas></div>';
  h += '<div class="model-explanation"><strong>数学模型说明</strong><br><br><strong>数据点：</strong>每条评分记录 (学生,科目) 是一个6维向量。<br>存储使用0-100分制，显示为五分制（3分合格，5分优秀）。<br><br><strong>算法：</strong>K-Means聚类（欧氏距离），多次随机重启。<br><strong>AP预测公式：</strong>见「预测公式」标签页。</div>';
  container.innerHTML = h;
  var ctx = document.getElementById('clusterRadarChart');
  if (ctx) {
    if (clusterRadarChart) clusterRadarChart.destroy();
    var ds = [];
    for (var ci = 0; ci < result.clusters.length; ci++) {
      var c = result.clusters[ci];
      var col = CLUSTER_COLORS[ci%CLUSTER_COLORS.length];
      ds.push({label:'第'+(ci+1)+'类', data:c.centroid.map(function(v){return v/20;}), borderColor:col.bg, backgroundColor:col.bg+'20', pointBackgroundColor:col.bg, pointRadius:3, borderWidth:2});
    }
    clusterRadarChart = new Chart(ctx, { type:'radar', data:{labels:ABILITIES, datasets:ds}, options:{ responsive:true, maintainAspectRatio:false, plugins:{ title:{display:true, text:'各类别能力画像对比（五分制）', font:{size:13}}, legend:{position:'bottom', labels:{font:{size:10}, boxWidth:12, padding:6}} }, scales:{ r:{ min:0, max:5, ticks:{stepSize:1, font:{size:9}}, pointLabels:{font:{size:11, weight:'500'}}, grid:{color:'#e2e8f0'}, angleLines:{color:'#e2e8f0'}} } } });
  }
}

// ═══════════════════════════════════════════
//  STANDARD
// ═══════════════════════════════════════════
function renderStandard() {
  var container = document.getElementById('tab-standard');
  var pts = getAnalysisPoints();
  if (pts.length<3) { container.innerHTML='<div class="empty-state"><div style="font-size:36px;">📏</div><p>至少3条数据</p></div>'; return; }
  var result = runClustering();
  if (!result) { container.innerHTML='<div class="empty-state"><p>请先在聚类模型中运行</p></div>'; return; }
  var sc = result.clusters.slice().sort(function(a,b){var sa=0,sb=0;for(var qi=0;qi<6;qi++){sa+=a.centroid[qi];sb+=b.centroid[qi];}return sb-sa;});
  var allScores = pts.map(function(p){var s=0;for(var qi=0;qi<6;qi++)s+=p.vector[qi];return s/6;});
  var gMin = Math.min.apply(null, allScores);
  var gMax = Math.max.apply(null, allScores);
  var gAvg = 0; for (var pi = 0; pi < allScores.length; pi++) gAvg += allScores[pi];
  gAvg = gAvg / allScores.length;
  var h = '<div class="insight-card insight" style="margin-bottom:12px;"><h4>整体评价尺规</h4><p>综合范围：'+to5(gMin)+'-'+to5(gMax)+' | 平均：'+to5(gAvg)+' | 数据：'+pts.length+'条</p></div><h3 style="font-size:14px;font-weight:600;margin-bottom:8px;">各类别评价标准（五分制）</h3>';
  for (var si = 0; si < sc.length; si++) {
    var c = sc[si];
    var col = CLUSTER_COLORS[si%CLUSTER_COLORS.length];
    var oAvg = 0; for (var qi = 0; qi < c.centroid.length; qi++) oAvg += c.centroid[qi];
    oAvg = oAvg / 6;
    var desc = oAvg/20>=3.5?'表现良好，适合挑战更高难度':oAvg/20>=2.5?'表现一般，针对性补强后可提升':'需重点关注，建议从弱项制定提升计划';
    var rankedItems = c.ranges.slice().sort(function(a,b){return b.avg-a.avg;});
    var strengths = rankedItems.slice(0,2).map(function(r){return r.ability+'('+to5(r.avg)+')';}).join('\u3001');
    var weakness = rankedItems[rankedItems.length-1];
    h += '<div class="cluster-card" style="background:'+col.light+';border-color:'+col.bg+'40;"><h4><span class="cluster-dot" style="background:'+col.bg+';"></span> '+esc(c.name)+'</h4><p style="font-size:13px;color:var(--text2);margin-bottom:6px;">综合区间：<strong>'+to5(Math.min.apply(null,c.members.map(function(m){var s=0;for(var qi=0;qi<6;qi++)s+=m.vector[qi];return s/6;})))+'-'+to5(Math.max.apply(null,c.members.map(function(m){var s=0;for(var qi=0;qi<6;qi++)s+=m.vector[qi];return s/6;})))+'</strong> | 典型：<strong>'+to5(oAvg)+'</strong> | 优势：'+esc(strengths)+' | 弱项：'+esc(weakness.ability)+'('+to5(weakness.avg)+')</p><p style="font-size:13px;color:var(--text2);">'+desc+'</p><div class="cluster-range"><table><thead><tr><th>能力</th><th>区间</th><th>典型值</th><th>等级</th></tr></thead><tbody>'+c.ranges.map(function(r){return '<tr><td style="text-align:left;font-weight:500;">'+esc(r.ability)+'</td><td>'+to5r(r.min)+'-'+to5r(r.max)+'</td><td><strong>'+to5(r.avg)+'</strong></td><td><span style="color:'+levelColor5(r.avg)+';font-weight:600;">'+level5(r.avg)+'</span></td></tr>';}).join('')+'</tbody></table></div><div style="font-size:12px;color:var(--text2);margin-top:4px;">成员：'+esc(c.members.map(function(m){return m.label;}).join('\u3001'))+'</div></div>';
  }
  h += '<div class="model-explanation" style="margin-top:12px;"><strong>评价标准说明</strong><br><br>综合分落在哪一类的区间内即判定为对应层次。等级：>=4.5优秀，>=3.5良好，>=3.0合格，>=2.0一般，<2.0待提升。<br><br><strong>AP预测公式</strong>可在「预测公式」标签页查看详细。</div>';
  h += '<div style="margin-top:12px;"><div class="chart-container"><canvas id="standardRadarChart"></canvas></div></div>';
  container.innerHTML = h;
  var sctx = document.getElementById('standardRadarChart');
  if (sctx) {
    if (standardRadarChart) standardRadarChart.destroy();
    var ds = [];
    for (var si2 = 0; si2 < sc.length; si2++) {
      var col = CLUSTER_COLORS[si2%CLUSTER_COLORS.length];
      ds.push({label: sc[si2].name, data: sc[si2].centroid.map(function(v){return v/20;}), borderColor: col.bg, backgroundColor: col.bg+'20', pointBackgroundColor: col.bg, pointRadius: 3, borderWidth: 2});
    }
    standardRadarChart = new Chart(sctx, { type:'radar', data:{labels:ABILITIES, datasets:ds}, options:{ responsive:true, maintainAspectRatio:false, plugins:{ title:{display:true, text:'各类别能力画像对比（五分制）', font:{size:13}}, legend:{position:'bottom', labels:{font:{size:10}, boxWidth:12, padding:6}} }, scales:{ r:{ min:0, max:5, ticks:{stepSize:1, font:{size:9}}, pointLabels:{font:{size:11, weight:'500'}}, grid:{color:'#e2e8f0'}, angleLines:{color:'#e2e8f0'}} } } });
  }
}

// ═══════════════════════════════════════════
//  INSIGHTS
// ═══════════════════════════════════════════
function renderInsights() {
  var container = document.getElementById('tab-insights');
  var pts = getAnalysisPoints();
  if (pts.length===0) { container.innerHTML='<div class="empty-state"><p>暂无数据</p></div>'; return; }
  var h='';
  for (var sn in students) {
    if (!students.hasOwnProperty(sn)) continue;
    var subs = students[sn];
    var entries = Object.entries(subs).filter(function(kv){return kv[0]!=='cls';});
    var t=[0,0,0,0,0,0], cnt=[0,0,0,0,0,0];
    for (var ei = 0; ei < entries.length; ei++) {
      var scoresArray = getScores(entries[ei][1]);
      for (var qi = 0; qi < scoresArray.length; qi++) { t[qi] += scoresArray[qi]; cnt[qi]++; }
    }
    var avgs = [];
    for (var qi = 0; qi < 6; qi++) {
      avgs.push({name: ABILITIES[qi], avg: cnt[qi]>0 ? t[qi]/cnt[qi] : 0});
    }
    avgs.sort(function(a,b){return b.avg-a.avg;});
    var allScores = entries.map(function(kv){
      var sa = getScores(kv[1]);
      var s = 0; for (var qi = 0; qi < sa.length; qi++) s += sa[qi];
      return {subject: kv[0], avg: s/6};
    });
    allScores.sort(function(a,b){return b.avg-a.avg;});
    h += '<div class="insight-card insight"><h4>'+esc(sn)+'（'+entries.length+'科）</h4><p><span style="color:var(--green);font-weight:500;">优势：</span>'+avgs.slice(0,2).map(function(a){return a.name+'('+to5(a.avg)+')';}).join('\u3001')+' | <span style="color:var(--red);font-weight:500;">待提升：</span>'+avgs.slice(-2).reverse().map(function(a){return a.name+'('+to5(a.avg)+')';}).join('\u3001')+'</p><p style="font-size:12px;color:var(--text2);margin-top:3px;">最强科目：'+esc(allScores[0].subject)+'（'+to5(allScores[0].avg)+'）'+(allScores.length>1?' | 弱科：'+esc(allScores[allScores.length-1].subject)+'（'+to5(allScores[allScores.length-1].avg)+'）':'')+'</p></div>';
  }
  var result=runClustering();
  if (result) {
    h+='<div class="insight-card strength"><h4>群体特征</h4><p>';
    result.clusters.sort(function(a,b){var sa=0,sb=0;for(var qi=0;qi<6;qi++){sa+=a.centroid[qi];sb+=b.centroid[qi];}return sb-sa;}).forEach(function(c,i){
      h += '第'+(i+1)+'类['+esc(c.name)+'] '+c.size+'条：'+esc(c.members.map(function(m){return m.label;}).join('\u3001'))+'<br>';
    });
    h+='</p></div>';
  }
  h+='<div style="margin-top:8px;"><div class="chart-container-sm"><canvas id="allRadarChart"></canvas></div></div>';
  container.innerHTML=h;
  var ctx=document.getElementById('allRadarChart');
  if (ctx) {
    if (window._allRadar) window._allRadar.destroy();
    var colors=['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316'];
    var ds = [];
    for (var pi = 0; pi < pts.length; pi++) {
      ds.push({label:pts[pi].label, data:pts[pi].vector.map(function(v){return v/20;}), borderColor:colors[pi%colors.length], backgroundColor:'transparent', pointRadius:3, borderWidth:1.5});
    }
    window._allRadar=new Chart(ctx,{ type:'radar',data:{labels:ABILITIES, datasets:ds}, options:{responsive:true, maintainAspectRatio:false, scales:{r:{min:0, max:5, ticks:{stepSize:1, font:{size:9}}, pointLabels:{font:{size:11}}, grid:{color:'#e2e8f0'}, angleLines:{color:'#e2e8f0'}}}, plugins:{legend:{position:'bottom', labels:{font:{size:9}, boxWidth:10, padding:4}}}} });
  }
}

function saveToFile() {
  var data={version:2,abilities:ABILITIES,exportedAt:new Date().toISOString(),students:students};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='学生评估数据_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
}
function loadFromFile(ev) {
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.students&&typeof d.students==='object')students=d.students;saveData();renderStudentSelect();document.getElementById('studentSelect').value='__new__';onStudentSelect();alert('加载成功！'+Object.keys(students).length+'名学生');}catch(err){alert('加载失败');}};
  r.readAsText(f);ev.target.value='';
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function level5(v){var s=v/20;return s>=4.5?'优秀':s>=3.5?'良好':s>=3.0?'合格':s>=2.0?'一般':'待提升';}
function levelColor5(v){var s=v/20;return s>=4.5?'var(--green)':s>=3.5?'var(--accent)':s>=3.0?'var(--amber)':'var(--red)';}
