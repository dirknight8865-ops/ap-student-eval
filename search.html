<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP 成绩查询</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #f1f5f9; --card: #fff; --accent: #3b82f6; --accent-h: #1d4ed8; --text: #0f172a; --text2: #475569; --border: #e2e8f0; --radius: 12px; --green: #22c55e; --red: #ef4444; --amber: #f59e0b; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 1000px; margin: 0 auto; padding: 32px 20px 60px; }
header { text-align: center; margin-bottom: 28px; }
header h1 { font-size: 26px; font-weight: 700; }
header .sub { color: var(--text2); font-size: 14px; margin-top: 2px; }
header a { font-size: 12px; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 6px; }
header a:hover { text-decoration: underline; }
.search-section { margin-bottom: 20px; }
.mode-bar { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
.mode-btn { padding: 8px 20px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: var(--card); color: var(--text2); }
.mode-btn.active { border-color: var(--accent); background: #eff6ff; color: var(--accent); }
.mode-btn:hover:not(.active) { border-color: #94a3b8; }
.search-row { display: flex; gap: 8px; max-width: 560px; margin: 0 auto; }
.search-row input, .search-row select { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; background: var(--card); }
.search-row input:focus, .search-row select:focus { border-color: var(--accent); }
.search-row button { padding: 12px 24px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.search-row button:hover { background: var(--accent-h); }
.filter-bar { display: flex; gap: 10px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
.filter-bar select { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: var(--card); }
.stats { text-align: center; margin-top: 10px; font-size: 13px; color: var(--text2); }
.results { margin-top: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.card h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.card .meta { font-size: 13px; color: var(--text2); margin-bottom: 10px; }
.sub { background: #f8fafc; border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
.sub:last-child { margin-bottom: 0; }
.sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.sn { font-size: 14px; font-weight: 600; }
.dots { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.d { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 4px; font-weight: 700; font-size: 12px; color: #fff; }
.dn { font-size: 11px; color: var(--text2); margin-right: 6px; }
.d-5 { background: var(--green); } .d-4 { background: var(--accent); } .d-3 { background: var(--amber); } .d-2 { background: #f97316; } .d-1 { background: var(--red); }
.pd { display: inline-flex; width: 28px; height: 28px; border-radius: 50%; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #fff; }
.pd-5 { background: var(--green); } .pd-4 { background: var(--accent); } .pd-3 { background: var(--amber); } .pd-2 { background: #f97316; } .pd-1 { background: var(--red); }
.info { font-size: 12px; color: var(--text2); margin-top: 4px; }
.empty { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 15px; }
.empty .icon { font-size: 48px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">
<header>
  <h1>🔍 AP 成绩查询</h1>
  <p class="sub">按学生姓名或科目查询成绩</p>
  <a href="index.html">→ 后台管理</a>
</header>

<div class="search-section">
  <div class="mode-bar">
    <button class="mode-btn active" onclick="switchMode('student')">👤 按学生</button>
    <button class="mode-btn" onclick="switchMode('subject')">📚 按科目</button>
  </div>
  <div id="searchRow" class="search-row">
    <input type="text" id="searchInput" placeholder="输入学生姓名..." autocomplete="off">
    <button onclick="search()">🔍 搜索</button>
  </div>
  <div id="filterBar" class="filter-bar"></div>
  <div id="stats" class="stats"></div>
</div>
<div id="results" class="results"></div>
</div>

<script>
var A = ['学习态度','学习自驱力','基础能力','英语能力','考试能力','抗压能力'];
var CF = {"AP Physics C: Mechanics":{pr:[0.1,0.2,0.4,0.4,0.2,0.1],sp:true},"AP Physics C: Electricity & Magnetism":{pr:[0.1,0.2,0.4,0.4,0.2,0.1],sp:true},"AP Calculus BC":{pr:[0,0,0,0.1,0.1,0.2],sp:false}};
function gs(d){return Array.isArray(d)?d:(d&&d.s?d.s:[]);}
function ga(d){return (d&&!Array.isArray(d)&&d.a!=null)?Math.round(d.a/20):null;}

var ED = {"Wode Wang":{"AP Physics C: Mechanics":{"s":[100,100,100,100,80,80],"a":100}},"Herbert Cao":{"AP Physics C: Mechanics":{"s":[80,60,80,80,80,80],"a":80},"AP Calculus BC":{"s":[60,80,60,100,100,80],"a":80}},"Chan Chan":{"AP Physics C: Mechanics":{"s":[60,60,20,20,20,60],"a":20},"AP Calculus BC":{"s":[60,60,20,20,20,20],"a":20}},"Marx Zhao":{"AP Physics C: Mechanics":{"s":[60,60,80,80,60,60],"a":60},"AP Calculus BC":{"s":[60,60,80,100,60,80],"a":80}},"Evan Ye":{"AP Physics C: Mechanics":{"s":[60,20,40,20,60,100],"a":20},"AP Calculus BC":{"s":[80,100,60,20,60,100],"a":60}},"Jenny Wang":{"AP Physics C: Mechanics":{"s":[20,20,40,80,60,20],"a":20},"AP Calculus BC":{"s":[40,40,60,80,60,40],"a":40}},"Lon Li":{"AP Physics C: Mechanics":{"s":[60,60,100,80,80,80],"a":60}},"Owen Wei":{"AP Calculus BC":{"s":[20,20,40,100,60,20],"a":40}},"Tom Gao":{"AP Calculus BC":{"s":[20,20,20,40,20,20],"a":20}},"Antonia Yang":{"AP Calculus BC":{"s":[60,40,20,60,20,20],"a":20}},"Shubert Ouyang":{"AP Calculus BC":{"s":[20,20,60,60,20,20],"a":20}},"Morri Zhao":{"AP Calculus BC":{"s":[20,20,20,40,20,20],"a":20}},"Katiana Tan":{"AP Calculus BC":{"s":[60,60,20,60,20,20],"a":20}},"Siru Wu":{"AP Calculus BC":{"s":[100,80,80,100,60,80],"a":80}},"Selina Huang":{"AP Calculus BC":{"s":[100,80,60,60,40,60],"a":null}},"Eathan Liu":{"AP Calculus BC":{"s":[60,60,80,60,60,80],"a":60}}};

var students = {}, mode = 'student';

function load() {
  var s = localStorage.getItem('sra_v4_ap');
  if (s) { try { students = JSON.parse(s); } catch(e) { students = {}; } }
  if (Object.keys(students).length === 0) {
    students = JSON.parse(JSON.stringify(ED));
    localStorage.setItem('sra_v4_ap', JSON.stringify(students));
  }
  updateFilter();
  updateStats();
}

function updateFilter() {
  var el = document.getElementById('filterBar');
  var cls = new Set();
  for (var n in students) { if (students[n].cls) cls.add(students[n].cls); }
  var h = '<select id="cf" onchange="search()"><option value="">\u5168\u90e8\u73ed\u7ea7</option>';
  [...cls].sort().forEach(function(c){h+='<option value="'+c+'">'+c+'</option>';});
  h += '</select>';
  el.innerHTML = h;
}

function updateStats() {
  var t = Object.keys(students).length;
  var sc = new Set();
  for (var n in students) { for (var k in students[n]) { if (k !== 'cls') sc.add(k); } }
  document.getElementById('stats').innerHTML = t>0 ? '<span>\ud83d\udc65 '+t+'\u540d\u5b66\u751f</span> <span>\ud83d\udcd6 '+sc.size+'\u4e2a\u79d1\u76ee</span>' : '';
}

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.mode-btn')[m==='student'?0:1].classList.add('active');
  var row = document.getElementById('searchRow');
  if (m === 'student') {
    row.innerHTML = '<input type="text" id="searchInput" placeholder="\u8f93\u5165\u5b66\u751f\u59d3\u540d..." autocomplete="off"><button onclick="search()">\ud83d\udd0d \u641c\u7d22</button>';
    document.getElementById('searchInput').addEventListener('keydown', function(e){if(e.key==='Enter')search();});
    document.getElementById('searchInput').focus();
  } else {
    var subs = new Set();
    for (var n in students) { for (var k in students[n]) { if (k!=='cls') subs.add(k); } }
    var h = '<select id="subjSelect" onchange="search()"><option value="">\u9009\u62e9\u79d1\u76ee...</option>';
    [...subs].sort().forEach(function(s){h+='<option value="'+s+'">'+s+'</option>';});
    h += '</select><button onclick="search()">\ud83d\udd0d \u67e5\u8be2</button>';
    row.innerHTML = h;
  }
  document.getElementById('results').innerHTML = '<div class="empty"><div class="icon">\ud83d\udd0d</div><p>\u8bf7\u8f93\u5165\u67e5\u8be2\u4fe1\u606f</p></div>';
}

function pred(s5, cn) {
  var f = CF[cn] || CF["AP Physics C: Mechanics"];
  var b = 0; for (var i=0;i<6;i++) b += s5[i]/6;
  var p = 0; for (var i=0;i<6;i++) p += Math.max(0,3-s5[i])*f.pr[i];
  if (f.sp && s5[2]>=4 && s5[0]<=3) p += 0.4;
  return Math.max(1, Math.min(5, Math.round(b-p)));
}
function to5(v){return Math.round(v/20);}

function search() {
  try {
    load();
    var el = document.getElementById('results');
    var cf = document.getElementById('cf') ? document.getElementById('cf').value : '';
    
    if (mode === 'student') {
      var inp = document.getElementById('searchInput');
      if (!inp) return;
      var q = inp.value.trim().toLowerCase();
      if (!q) {
        el.innerHTML = '<div class="empty"><div class="icon">\ud83d\udd0d</div><p>\u8bf7\u8f93\u5165\u5b66\u751f\u59d3\u540d</p></div>';
        return;
      }
      
      var html = '';
      var found = false;
      for (var name in students) {
        if (name.toLowerCase().indexOf(q) >= 0 && (!cf || students[name].cls === cf)) {
          found = true;
          var clsTag = students[name].cls ? ' <span style="font-size:13px;color:var(--text2);font-weight:400;">[' + students[name].cls + ']</span>' : '';
          html += '<div class="card"><h3>\ud83d\udc64 ' + esc(name) + clsTag + '</h3>';
          var cnt = 0;
          for (var sj in students[name]) {
            if (sj === 'cls') continue;
            cnt++;
            var sc = students[name][sj];
            var s5 = gs(sc).map(to5);
            var p = pred(s5, sj);
            var a = ga(sc);
            html += '<div class="sub"><div class="sh"><span class="sn">' + esc(sj) + '</span><span class="pd pd-' + p + '">' + p + '</span></div><div class="dots">';
            for (var i=0;i<6;i++) html += '<span class="d d-' + s5[i] + '">' + s5[i] + '</span><span class="dn">' + A[i].slice(0,2) + '</span>';
            html += '</div><div class="info">\u9884\u6d4bAP: <strong>' + p + '</strong> | \u5b9e\u9645AP: ';
            html += (a != null ? '<strong style="color:var(--accent)">' + a + '</strong>' : '<span style="color:#94a3b8;">\u672a\u5f55\u5165</span>');
            html += '</div></div>';
          }
          html += '<div class="meta">' + cnt + ' \u4e2a\u79d1\u76ee</div></div>';
        }
      }
      el.innerHTML = found ? html : '<div class="empty"><div class="icon">\ud83d\ude15</div><p>\u672a\u627e\u5230\u5b66\u751f "' + q + '"</p></div>';
      
    } else {
      // Subject search
      var sel = document.getElementById('subjSelect');
      if (!sel || !sel.value) {
        el.innerHTML = '<div class="empty"><div class="icon">\ud83d\udcda</div><p>\u8bf7\u9009\u62e9\u4e00\u4e2a\u79d1\u76ee</p></div>';
        return;
      }
      var sj = sel.value;
      var rows = [];
      for (var name in students) {
        if (students[name][sj]) {
          var sc = students[name][sj];
          var s5 = gs(sc).map(to5);
          rows.push({name:name, cls:students[name].cls||null, scores:s5, pred:pred(s5,sj), actual:ga(sc), avg:s5.reduce(function(a,b){return a+b;},0)/6});
        }
      }
      rows.sort(function(a,b){return b.avg-a.avg;});
      
      if (rows.length === 0) {
        el.innerHTML = '<div class="empty"><div class="icon">\ud83d\ude15</div><p>\u8be5\u79d1\u76ee\u6682\u65e0\u6570\u636e</p></div>'; return;
      }
      
      var html = '<div class="card"><h3>\ud83d\udcd6 ' + esc(sj) + '</h3><div class="meta">' + rows.length + ' \u540d\u5b66\u751f</div>';
      for (var ri=0;ri<rows.length;ri++) {
        var r = rows[ri];
        var clsTag = r.cls ? ' <span style="font-size:11px;color:var(--text2);">[' + r.cls + ']</span>' : '';
        html += '<div class="sub"><div class="sh"><span class="sn">#' + (ri+1) + ' ' + esc(r.name) + clsTag + '</span><span class="pd pd-' + r.pred + '">' + r.pred + '</span></div><div class="dots">';
        for (var i=0;i<6;i++) html += '<span class="d d-' + r.scores[i] + '">' + r.scores[i] + '</span><span class="dn">' + A[i].slice(0,2) + '</span>';
        html += '</div><div class="info">\u7efc\u5408: ' + r.avg.toFixed(1) + ' | \u9884\u6d4bAP: <strong>' + r.pred + '</strong> | \u5b9e\u9645AP: ';
        html += (r.actual != null ? '<strong style="color:var(--accent)">' + r.actual + '</strong>' : '<span style="color:#94a3b8;">-</span>');
        html += '</div></div>';
      }
      html += '</div>';
      el.innerHTML = html;
    }
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="empty"><div class="icon">\u26a0\ufe0f</div><p style="color:var(--red);">\u9519\u8bef: ' + e.message + '</p></div>';
  }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

load();
</script>
</body>
</html>
